<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAT Eletrônico - Comunicação de Acidente de Trabalho</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCPx8x3DrPZLm8LMseJgxsQp2DPzUC3T28",
      authDomain: "cat-eletronico.firebaseapp.com",
      projectId: "cat-eletronico",
      storageBucket: "cat-eletronico.firebasestorage.app",
      messagingSenderId: "81624904556",
      appId: "1:81624904556:web:ab57c98e6663beb0073949"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    body { background:#0f0f0f; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:16px; padding:32px; width:100%; max-width:480px; }
    .cat-card { max-width:700px !important; }
    .header { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
    .icon { background:#ff6b00; padding:8px; border-radius:8px; font-size:20px; }
    h1 { font-size:18px; font-weight:700; letter-spacing:1px; }
    .subtitle { font-size:11px; color:#888; margin-top:2px; }
    .tabs { display:flex; background:#0f0f0f; border-radius:8px; padding:4px; margin-bottom:24px; gap:4px; }
    .tab { flex:1; padding:10px; border:none; background:transparent; color:#888; border-radius:6px; font-weight:600; cursor:pointer; transition:all .2s; }
    .tab.active { background:#2d88ff; color:#fff; }
    input, select, textarea { width:100%; background:#0f0f0f; border:1px solid #2a2a2a; border-radius:8px; padding:12px; color:#fff; font-size:14px; outline:none; transition:border-color .15s; }
    input:focus, select:focus, textarea:focus { border-color:#ff6b00; }
    input::placeholder, textarea::placeholder { color:#555; }
    label { font-size:12px; color:#aaa; margin-bottom:6px; display:block; }
    .btn { width:100%; padding:14px; border:none; border-radius:8px; font-weight:700; cursor:pointer; margin-top:8px; font-size:14px; transition:opacity .2s; }
    .btn:hover { opacity:.9; }
    .btn-primary { background:linear-gradient(90deg,#ff9500,#ff6b00); color:#000; }
    .btn-secondary { background:#2d88ff; color:#fff; }
    .form-group { margin-bottom:14px; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
    .hidden { display:none; }
    h3 { font-size:13px; margin:18px 0 10px; color:#ff6b00; letter-spacing:1px; text-transform:uppercase; }
    .alert { padding:10px 14px; border-radius:8px; font-size:12px; margin-bottom:12px; display:none; }
    .alert.show { display:block; }
    .alert-err { background:#2a0a0a; border:1px solid #5c1a1a; color:#f85149; }
    .alert-ok { background:#0a2a10; border:1px solid #1a5c20; color:#3fb950; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid #555; border-top-color:#ff6b00; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .sair-btn { margin-left:auto; background:#2a2a2a; color:#fff; border:none; padding:8px 14px; border-radius:6px; cursor:pointer; font-size:12px; }
    .cat-item { background:#0f0f0f; border:1px solid #2a2a2a; border-radius:10px; padding:12px 14px; margin-bottom:8px; }
    .cat-item-nome { font-size:13px; font-weight:600; }
    .cat-item-meta { font-size:10px; color:#888; margin-top:3px; }
  </style>
</head>
<body>

<!-- LOGIN / REGISTO -->
<div class="card" id="authCard">
  <div class="header">
    <div class="icon">⚠️</div>
    <div>
      <h1>CAT ELETRÔNICO</h1>
      <div class="subtitle">COMUNICAÇÃO DE ACIDENTE DE TRABALHO</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="mostrarLogin()">Entrar</button>
    <button class="tab" onclick="mostrarRegistro()">Registar</button>
  </div>

  <!-- LOGIN -->
  <div id="loginForm">
    <div class="alert alert-err" id="errLogin"></div>
    <div class="form-group"><label>EMAIL</label><input type="email" id="loginEmail" placeholder="empresa@email.com"/></div>
    <div class="form-group"><label>PASSWORD</label><input type="password" id="loginSenha" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/></div>
    <button class="btn btn-primary" id="btnLogin" onclick="login()">Entrar →</button>
  </div>

  <!-- REGISTO -->
  <div id="registroForm" style="display:none;">
    <div class="alert alert-err" id="errReg"></div>
    <div class="alert alert-ok" id="okReg"></div>
    <div class="form-group"><label>NOME DA EMPRESA</label><input type="text" id="regEmpresa" placeholder="Empresa LTDA"/></div>
    <div class="form-group"><label>NUIT / CNPJ</label><input type="text" id="regCnpj" placeholder="000 000 000"/></div>
    <div class="form-group"><label>EMAIL</label><input type="email" id="regEmail" placeholder="empresa@email.com"/></div>
    <div class="form-group"><label>PASSWORD</label><input type="password" id="regSenha" placeholder="Mínimo 6 caracteres"/></div>
    <button class="btn btn-primary" id="btnReg" onclick="registrar()">Criar Conta →</button>
    <button class="btn" style="background:#2a2a2a;color:#888;margin-top:6px;" onclick="mostrarLogin()">Já tenho conta</button>
  </div>
</div>

<!-- FORMULÁRIO CAT -->
<div class="card cat-card hidden" id="catCard">
  <div class="header">
    <div class="icon">⚠️</div>
    <div><h1>NOVA CAT</h1><div class="subtitle" id="empresaNome"></div></div>
    <button class="sair-btn" onclick="logout()">Sair</button>
  </div>

  <h3>1. Dados do Empregador</h3>
  <div class="grid-2">
    <div><label>Razão Social</label><input id="razao_social"/></div>
    <div><label>NUIT / CNPJ</label><input id="cnpj"/></div>
  </div>
  <div class="form-group"><label>Endereço</label><input id="endereco" placeholder="Rua, número, cidade..."/></div>
  <div class="form-group"><label>Telefone</label><input id="telefone" placeholder="+258 00 000 0000"/></div>

  <h3>2. Dados do Acidentado</h3>
  <div class="grid-2">
    <div><label>Nome Completo</label><input id="nome_acidentado"/></div>
    <div><label>Nº Funcionário</label><input id="num_func" placeholder="Ex: 00123"/></div>
  </div>
  <div class="grid-2">
    <div><label>NUIT / CPF</label><input id="cpf"/></div>
    <div><label>Data de Nascimento</label><input type="date" id="nascimento"/></div>
  </div>
  <div class="grid-2">
    <div><label>Sexo</label><select id="sexo"><option>Masculino</option><option>Feminino</option></select></div>
    <div><label>Função</label><input id="funcao" placeholder="Ex: Operador de máquinas"/></div>
  </div>

  <h3>3. Dados do Acidente</h3>
  <div class="grid-2">
    <div><label>Data do Acidente</label><input type="date" id="data_acidente"/></div>
    <div><label>Hora</label><input type="time" id="hora_acidente"/></div>
  </div>
  <div class="grid-2">
    <div><label>Local</label><select id="local_tipo"><option>Estabelecimento</option><option>Trajeto</option><option>Outro</option></select></div>
    <div><label>Tipo de Acidente</label><select id="tipo_acidente"><option>Típico</option><option>Trajeto</option><option>Doença Ocupacional</option></select></div>
  </div>
  <div class="form-group"><label>Descrição do Local</label><input id="local_acidente" placeholder="Ex: Galpão 3, Máquina 12"/></div>
  <div class="form-group"><label>Descrição do Acidente</label><textarea id="descricao" rows="3" placeholder="Descreva como ocorreu o acidente"></textarea></div>
  <div class="grid-2">
    <div><label>Parte do Corpo Atingida</label><input id="parte_corpo" placeholder="Ex: Mão direita"/></div>
    <div><label>Agente Causador</label><input id="agente" placeholder="Ex: Máquina"/></div>
  </div>

  <h3>4. Atendimento Médico</h3>
  <div class="grid-2">
    <div><label>CID-10</label><input id="cid" placeholder="Ex: S61.0"/></div>
    <div><label>Houve Afastamento?</label><select id="afastamento"><option>Sim</option><option>Não</option></select></div>
  </div>
  <div class="form-group"><label>Hospital / Unidade de Saúde</label><input id="hospital" placeholder="Ex: Hospital Central"/></div>

  <h3>5. Responsáveis</h3>
  <div class="grid-2">
    <div><label>Testemunha</label><input id="testemunha"/></div>
    <div><label>Supervisor</label><input id="supervisor"/></div>
  </div>

  <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;">
    <button class="btn btn-secondary" style="flex:1;" onclick="salvarCAT()">💾 Guardar</button>
    <button class="btn btn-primary" style="flex:1;" onclick="gerarPDFCAT()">⬇ Gerar PDF</button>
  </div>
  <div class="alert alert-err" id="errCat" style="margin-top:10px;"></div>
  <div class="alert alert-ok" id="okCat" style="margin-top:10px;"></div>

  <h3 style="margin-top:24px;">Histórico de CATs</h3>
  <div id="historicoCats"><div style="color:#555;font-size:12px;text-align:center;padding:16px;">A carregar...</div></div>
</div>

<script>
function mostrarLogin() {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('registroForm').style.display = 'none';
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.querySelectorAll('.tab')[1].classList.remove('active');
}

function mostrarRegistro() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('registroForm').style.display = 'block';
  document.querySelectorAll('.tab')[1].classList.add('active');
  document.querySelectorAll('.tab')[0].classList.remove('active');
}

function showAlert(id, msg) { var e=document.getElementById(id); e.textContent=msg; e.classList.add('show'); }
function hideAlert(id) { document.getElementById(id).classList.remove('show'); }
function v(id) { var el=document.getElementById(id); return el ? el.value : ''; }

async function registrar() {
  hideAlert('errReg'); hideAlert('okReg');
  var email=document.getElementById('regEmail').value.trim();
  var pass=document.getElementById('regSenha').value;
  var empresa=document.getElementById('regEmpresa').value.trim();
  var cnpj=document.getElementById('regCnpj').value.trim();
  if(!empresa||!email||!pass){ showAlert('errReg','Preenche todos os campos.'); return; }
  if(pass.length<6){ showAlert('errReg','A password deve ter pelo menos 6 caracteres.'); return; }
  var btn=document.getElementById('btnReg');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> A criar...';
  try {
    var cred=await auth.createUserWithEmailAndPassword(email,pass);
    await db.collection('empresas').doc(cred.user.uid).set({nome:empresa,cnpj:cnpj,email:email});
    showAlert('okReg','✓ Conta criada! Podes fazer login.');
    ['regEmpresa','regCnpj','regEmail','regSenha'].forEach(function(id){ document.getElementById(id).value=''; });
  } catch(e) {
    var msg = e.code==='auth/email-already-in-use' ? 'Este email já está registado.' :
              e.code==='auth/invalid-email' ? 'Email inválido.' : e.message;
    showAlert('errReg', msg);
  }
  btn.disabled=false; btn.innerHTML='Criar Conta →';
}

async function login() {
  hideAlert('errLogin');
  var email=document.getElementById('loginEmail').value.trim();
  var pass=document.getElementById('loginSenha').value;
  if(!email||!pass){ showAlert('errLogin','Preenche o email e a password.'); return; }
  var btn=document.getElementById('btnLogin');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> A entrar...';
  try {
    await auth.signInWithEmailAndPassword(email,pass);
  } catch(e) {
    var msg = (e.code==='auth/user-not-found'||e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')
      ? 'Email ou password incorretos.' : e.message;
    showAlert('errLogin', msg);
    btn.disabled=false; btn.innerHTML='Entrar →';
  }
}

async function logout() { await auth.signOut(); }

auth.onAuthStateChanged(async function(user) {
  if(user) {
    try {
      var doc=await db.collection('empresas').doc(user.uid).get();
      var data=doc.data()||{};
      document.getElementById('authCard').classList.add('hidden');
      document.getElementById('catCard').classList.remove('hidden');
      document.getElementById('empresaNome').textContent=data.nome||user.email;
      document.getElementById('razao_social').value=data.nome||'';
      document.getElementById('cnpj').value=data.cnpj||'';
      carregarHistorico(user.uid);
    } catch(e){ console.error(e); }
  } else {
    document.getElementById('authCard').classList.remove('hidden');
    document.getElementById('catCard').classList.add('hidden');
    var btn=document.getElementById('btnLogin');
    btn.disabled=false; btn.innerHTML='Entrar →';
  }
});

async function salvarCAT() {
  var user=auth.currentUser; if(!user) return;
  var cat={
    user_id:user.uid, razao_social:v('razao_social'), cnpj:v('cnpj'),
    endereco:v('endereco'), telefone:v('telefone'),
    nome_acidentado:v('nome_acidentado'), num_func:v('num_func'),
    cpf:v('cpf'), nascimento:v('nascimento'), sexo:v('sexo'), funcao:v('funcao'),
    data_acidente:v('data_acidente'), hora_acidente:v('hora_acidente'),
    local_tipo:v('local_tipo'), tipo_acidente:v('tipo_acidente'),
    local_acidente:v('local_acidente'), descricao:v('descricao'),
    parte_corpo:v('parte_corpo'), agente:v('agente'),
    cid:v('cid'), afastamento:v('afastamento'), hospital:v('hospital'),
    testemunha:v('testemunha'), supervisor:v('supervisor'),
    criado_em:firebase.firestore.FieldValue.serverTimestamp()
  };
  try {
    await db.collection('cats').add(cat);
    showAlert('okCat','✓ CAT guardado com sucesso!');
    carregarHistorico(user.uid);
  } catch(e){ showAlert('errCat','Erro: '+e.message); }
}

async function carregarHistorico(uid) {
  var el=document.getElementById('historicoCats');
  try {
    var snap=await db.collection('cats').where('user_id','==',uid).orderBy('criado_em','desc').limit(10).get();
    if(snap.empty){ el.innerHTML='<div style="color:#555;font-size:12px;text-align:center;padding:16px;">Nenhum CAT registado ainda.</div>'; return; }
    el.innerHTML=snap.docs.map(function(d){
      var c=d.data();
      var af=c.afastamento==='Sim'?'🔴 Com afastamento':'🟢 Sem afastamento';
      return '<div class="cat-item"><div class="cat-item-nome">'+(c.nome_acidentado||'—')+'</div>'+
        '<div class="cat-item-meta">'+(c.data_acidente||'—')+' · '+(c.tipo_acidente||'—')+' · '+af+'</div></div>';
    }).join('');
  } catch(e){ el.innerHTML='<div style="color:#555;font-size:12px;padding:10px;">Erro ao carregar histórico.</div>'; }
}

function gerarPDFCAT() {
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var PW=210,ML=14,CW=182,y=14;
  var today=new Date().toLocaleDateString('pt-PT');
  var catNum='CAT-'+Date.now().toString().slice(-8);
  var sf=function(st,sz,c){doc.setFont('helvetica',st);doc.setFontSize(sz);doc.setTextColor.apply(doc,c||[17,17,17]);};
  var wrap=function(t,w){return doc.splitTextToSize(String(t||'—'),w);};
  var chk=function(n){if(y+(n||20)>280){doc.addPage();y=14;}};
  var sh=function(t){doc.setFillColor(10,42,74);doc.rect(ML,y,CW,7,'F');sf('bold',9,[255,255,255]);doc.text(t,ML+3,y+5);y+=9;};
  var fr=function(lbl,val){
    var lines=wrap(val,CW-52);var rh=Math.max(8,lines.length*5+3);
    doc.setFillColor(247,250,252);doc.rect(ML,y,CW,rh,'F');
    doc.setDrawColor(212,220,232);doc.setLineWidth(0.2);doc.rect(ML,y,CW,rh);
    doc.setFillColor(240,244,248);doc.rect(ML,y,48,rh,'F');
    sf('bold',8,[51,65,85]);doc.text(lbl,ML+2,y+rh/2+1,{maxWidth:44});
    sf('normal',8.5,[17,17,17]);doc.text(lines,ML+51,y+5);y+=rh;
  };
  doc.setFillColor(10,42,74);doc.rect(0,0,PW,22,'F');
  doc.setFillColor(240,165,0);doc.rect(0,0,4,22,'F');
  sf('bold',14,[255,255,255]);doc.text('COMUNICAÇÃO DE ACIDENTE DE TRABALHO',ML+4,10);
  sf('normal',8,[176,196,216]);doc.text('Formulário Eletrónico Oficial',ML+4,16);
  sf('bold',10,[240,165,0]);doc.text(catNum,PW-14,9,{align:'right'});
  sf('normal',8,[176,196,216]);doc.text('Emitido em '+today,PW-14,15,{align:'right'});
  y=28;
  sh('1 — DADOS DO EMPREGADOR');
  fr('Razão Social',v('razao_social'));fr('NUIT / CNPJ',v('cnpj'));fr('Endereço',v('endereco'));fr('Telefone',v('telefone'));y+=4;chk(70);
  sh('2 — DADOS DO ACIDENTADO');
  fr('Nome Completo',v('nome_acidentado'));fr('Nº Funcionário',v('num_func'));fr('NUIT / CPF',v('cpf'));fr('Nascimento',v('nascimento'));fr('Sexo',v('sexo'));fr('Função',v('funcao'));y+=4;chk(80);
  sh('3 — DADOS DO ACIDENTE');
  fr('Data do Acidente',v('data_acidente'));fr('Hora',v('hora_acidente'));fr('Local (tipo)',v('local_tipo'));fr('Tipo de Acidente',v('tipo_acidente'));fr('Descrição do Local',v('local_acidente'));fr('Descrição da Ocorrência',v('descricao'));fr('Parte do Corpo',v('parte_corpo'));fr('Agente Causador',v('agente'));y+=4;chk(40);
  sh('4 — ATENDIMENTO MÉDICO');
  fr('CID-10',v('cid'));fr('Houve Afastamento?',v('afastamento'));fr('Hospital',v('hospital'));y+=4;chk(30);
  sh('5 — RESPONSÁVEIS');
  fr('Testemunha',v('testemunha'));fr('Supervisor',v('supervisor'));y+=10;
  chk(35);
  doc.setDrawColor(10,42,74);doc.setLineWidth(0.5);doc.line(ML,y,PW-14,y);y+=6;
  var sw=(CW-12)/3;
  ['Responsável da Empresa','Trabalhador / Representante','Técnico de SST'].forEach(function(s,i){
    var sx=ML+i*(sw+6);
    sf('normal',7.5,[120,120,120]);doc.text(s,sx+sw/2,y,{align:'center'});
    doc.setDrawColor(180,180,180);doc.setLineWidth(0.3);doc.line(sx,y+16,sx+sw,y+16);
  });
  var tp=doc.internal.getNumberOfPages();
  for(var p=1;p<=tp;p++){
    doc.setPage(p);sf('normal',7,[160,160,160]);
    doc.text(catNum+' · Gerado em '+today+' · Pág. '+p+'/'+tp,PW/2,291,{align:'center'});
  }
  doc.save('CAT_'+(v('nome_acidentado')||'acidentado').replace(/\s+/g,'_')+'_'+(v('data_acidente')||today)+'.pdf');
}
</script>
</body>
</html>
