<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Electronico</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        h1 { color: #00ff88; text-align: center; }
        input, button { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
        button { 
            background: #00ff88; 
            color: black; 
            font-weight: bold;
            cursor: pointer;
        }
        .lista { margin-top: 20px; }
        .item { 
            background: #2a2a2a; 
            padding: 10px; 
            margin: 5px 0; 
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Cat Electronico 🐱</h1>
    
    <input type="text" id="nomeItem" placeholder="Digite um item...">
    <button onclick="adicionarItem()">Adicionar</button>
    
    <div class="lista" id="listaItens"></div>

    <script>
        // CONFIGURAÇÃO SUPABASE
        const supabaseUrl = 'https://dbjawohqwbwqduzglxcf.supabase.co'
        const supabaseKey = 'sb_publishable_fK5b31w8M-CJCIM9J4T4Gw_F2OlhpTO'
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

        // CARREGAR ITENS QUANDO ABRE A PÁGINA
        carregarItens()

        async function carregarItens() {
            const { data, error } = await supabase
                .from('itens')
                .select('*')
                .order('created_at', { ascending: false })
            
            if (error) {
                console.error('Erro:', error)
                return
            }
            
            const lista = document.getElementById('listaItens')
            lista.innerHTML = ''
            data.forEach(item => {
                lista.innerHTML += `<div class="item">${item.nome}</div>`
            })
        }

        async function adicionarItem() {
            const nome = document.getElementById('nomeItem').value
            if (!nome) return alert('Digite algo!')
            
            const { error } = await supabase
                .from('itens')
                .insert([{ nome: nome }])
            
            if (error) {
                alert('Erro ao salvar: ' + error.message)
            } else {
                document.getElementById('nomeItem').value = ''
                carregarItens()
            }
        }
    </script>
</body>
</html>
