<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Eletrônico</title>
  <style>
    body { background: #111; color: #0f0; font-family: sans-serif; text-align: center; padding: 20px; }
    input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
    button { background: #0f0; color: #111; font-weight: bold; cursor: pointer; }
    #lista div { background: #222; margin: 5px; padding: 10px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>Cat Eletrônico 😻</h1>
  <form>
    <input type="text" placeholder="Digite algo..." required>
    <button type="submit">Adicionar</button>
  </form>
  <div id="lista"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    
    const supabaseUrl = 'https://dbjawohqwbwqduzglxcf.supabase.co'
    const supabaseKey = 'sb_publishable_fK5b31w8M-CJCIM9J4T4Gw_F2OlhpTO
    const supabase = createClient(supabaseUrl, supabaseKey)

    const form = document.querySelector('form')
    const input = document.querySelector('input')
    const lista = document.querySelector('#lista')

    async function carregarItens() {
      const { data, error } = await supabase.from('itens').select('*').order('id')
      if (error) alert('ERRO AO CARREGAR: ' + error.message)
      lista.innerHTML = ''
      data?.forEach(item => {
        lista.innerHTML += `<div>${item.nome}</div>`
      })
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const nome = input.value
      const { error } = await supabase.from('itens').insert({ nome })
      if (error) alert('ERRO AO ADICIONAR: ' + error.message)
      input.value = ''
      carregarItens()
    })

    carregarItens()
  </script>
</body>
</html>
