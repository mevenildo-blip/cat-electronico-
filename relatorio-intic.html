<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório INTIC - CATs</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCPx8x3DrPZLm8LMseJgxsQp2DPzUC3T28",
      authDomain: "cat-eletronico.firebaseapp.com",
      projectId: "cat-eletronico",
      storageBucket: "cat-eletronico.firebasestorage.app",
      messagingSenderId: "81624904556",
      appId: "1:81624904556:web:ab57c98e6663beb0073949"
    });
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d1117;color:#c9d1d9;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:40px;width:100%;max-width:500px;text-align:center;}
    .logo{width:60px;height:60px;background:linear-gradient(135deg,#ff9500,#ff6b00);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;}
    h1{font-size:20px;color:#ffffff;letter-spacing:1px;margin-bottom:6px;}
    .sub{font-size:12px;color:#8b949e;margin-bottom:30px;}
    .login-box{margin-bottom:20px;text-align:left;}
    label{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px;}
    input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:11px 13px;color:#c9d1d9;font-size:14px;outline:none;transition:border-color .15s;}
    input:focus{border-color:#ff6b00;}
    input::placeholder{color:#484f58;}
    .btn{width:100%;padding:13px;border:none;border-radius:9px;font-weight:700;cursor:pointer;font-size:14px;transition:opacity .2s;margin-top:6px;}
    .btn-primary{background:linear-gradient(90deg,#ff9500,#ff6b00);color:#000;}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;}
    .btn-secondary{background:#238636;color:#fff;}
    .btn-logout{background:#21262d;color:#8b949e;border:1px solid #30363d;margin-top:10px;}
    .alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;display:none;}
    .alert.show{display:block;}
    .alert-err{background:#2d1117;border:1px solid #f85149;color:#f85149;}
    .alert-ok{background:#0d2114;border:1px solid #3fb950;color:#3fb950;}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid #555;border-top-color:#ff6b00;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    /* DASHBOARD */
    .dashboard{display:none;text-align:left;}
    .dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
    .dash-title{font-size:16px;font-weight:700;color:#fff;}
    .dash-sub{font-size:11px;color:#8b949e;margin-top:2px;}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
    .stat{background:#0d1117;border:1px solid #30363d;border-radius:10px;padding:14px;text-align:center;}
    .stat-num{font-size:28px;font-weight:700;color:#ff6b00;}
    .stat-label{font-size:10px;color:#8b949e;margin-top:3px;}
    .section-title{font-size:11px;color:#ff6b00;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
    .cat-row{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 13px;margin-bottom:6px;}
    .cat-row-num{font-size:10px;color:#ff6b00;font-weight:700;margin-bottom:2px;}
    .cat-row-nome{font-size:13px;font-weight:600;color:#e6edf3;}
    .cat-row-meta{font-size:10px;color:#8b949e;margin-top:2px;}
    .empty{color:#484f58;font-size:12px;text-align:center;padding:20px;}
    .gen-btn{width:100%;padding:13px;background:linear-gradient(90deg,#ff9500,#ff6b00);border:none;border-radius:9px;font-weight:700;cursor:pointer;font-size:14px;color:#000;margin-top:16px;}
    .gen-btn:disabled{opacity:.5;cursor:not-allowed;}
  </style>
</head>
<body>

<div class="card" id="mainCard">

  <!-- LOGIN -->
  <div id="loginSection">
    <div class="logo">⚠️</div>
    <h1>CAT ELETRÓNICO</h1>
    <div class="sub">Relatório Oficial — Acesso Restrito</div>

    <div class="alert alert-err" id="errLogin"></div>

    <div class="login-box">
      <label>Email</label>
      <input type="email" id="lEmail" placeholder="admin@email.com"/>
    </div>
    <div class="login-box">
      <label>Password</label>
      <input type="password" id="lPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary" id="btnLogin" onclick="doLogin()">Entrar →</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashSection" class="dashboard">
    <div class="dash-header">
      <div>
        <div class="dash-title">📊 Relatório INTIC</div>
        <div class="dash-sub" id="dashUser"></div>
      </div>
      <button class="btn btn-logout" style="width:auto;padding:7px 14px;font-size:11px;" onclick="doLogout()">Sair</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-num" id="stTotal">—</div><div class="stat-label">Total CATs</div></div>
      <div class="stat"><div class="stat-num" id="stEmpresas">—</div><div class="stat-label">Empresas</div></div>
      <div class="stat"><div class="stat-num" id="stAfastamento">—</div><div class="stat-label">Com Afastamento</div></div>
      <div class="stat"><div class="stat-num" id="stMes">—</div><div class="stat-label">Este Mês</div></div>
    </div>

    <div class="section-title">Últimos CATs Registados</div>
    <div id="catLista"><div class="empty">A carregar...</div></div>

    <button class="gen-btn" id="btnGerar" onclick="gerarPDF()">📄 Gerar PDF Completo</button>
    <div class="alert alert-ok" id="okGerar" style="margin-top:10px;"></div>
  </div>

</div>

<script>
function showAlert(id,msg){var e=document.getElementById(id);e.textContent=msg;e.classList.add('show');}
function hideAlert(id){document.getElementById(id).classList.remove('show');}

async function doLogin(){
  hideAlert('errLogin');
  var email=document.getElementById('lEmail').value.trim();
  var pass=document.getElementById('lPass').value;
  if(!email||!pass){showAlert('errLogin','Preenche o email e a password.');return;}
  var btn=document.getElementById('btnLogin');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> A entrar...';
  try{
    await auth.signInWithEmailAndPassword(email,pass);
  }catch(e){
    showAlert('errLogin','Email ou password incorretos.');
    btn.disabled=false;btn.innerHTML='Entrar →';
  }
}

function doLogout(){auth.signOut();}

auth.onAuthStateChanged(function(user){
  if(user){
    document.getElementById('loginSection').style.display='none';
    document.getElementById('dashSection').style.display='block';
    document.getElementById('dashUser').textContent=user.email;
    carregarDados();
  } else {
    document.getElementById('loginSection').style.display='block';
    document.getElementById('dashSection').style.display='none';
    document.getElementById('btnLogin').disabled=false;
    document.getElementById('btnLogin').innerHTML='Entrar →';
  }
});

var todosCATs = [];

async function carregarDados(){
  try{
    var snap = await db.collection('cats').orderBy('criado_em','desc').get();
    todosCATs = [];
    snap.forEach(function(d){ todosCATs.push(d.data()); });

    // Stats
    var empresas = [...new Set(todosCATs.map(function(c){return c.user_id;}))].length;
    var afastamento = todosCATs.filter(function(c){return c.afastamento==='Sim';}).length;
    var mesAtual = new Date().getMonth();
    var anoAtual = new Date().getFullYear();
    var estesMes = todosCATs.filter(function(c){
      if(!c.criado_em) return false;
      var d = new Date(c.criado_em.seconds*1000);
      return d.getMonth()===mesAtual && d.getFullYear()===anoAtual;
    }).length;

    document.getElementById('stTotal').textContent = todosCATs.length;
    document.getElementById('stEmpresas').textContent = empresas;
    document.getElementById('stAfastamento').textContent = afastamento;
    document.getElementById('stMes').textContent = estesMes;

    // Lista
    var el = document.getElementById('catLista');
    if(!todosCATs.length){
      el.innerHTML='<div class="empty">Nenhum CAT registado ainda.</div>';
      return;
    }
    el.innerHTML = todosCATs.slice(0,10).map(function(c){
      var af = c.afastamento==='Sim'?'🔴 Com afastamento':'🟢 Sem afastamento';
      var dataAberta = c.data_abertura || (c.criado_em ? new Date(c.criado_em.seconds*1000).toLocaleDateString('pt-PT') : '—');
      return '<div class="cat-row">'+
        '<div class="cat-row-num">'+(c.cat_num||'—')+'</div>'+
        '<div class="cat-row-nome">'+(c.nome_acidentado||'—')+'</div>'+
        '<div class="cat-row-meta">'+(c.razao_social||'—')+' · '+(c.data_acidente||'—')+' · '+af+'</div>'+
        '<div class="cat-row-meta" style="color:#484f58;">Aberto em: '+dataAberta+'</div>'+
        '</div>';
    }).join('');

  }catch(e){
    document.getElementById('catLista').innerHTML='<div class="empty">Erro ao carregar: '+e.message+'</div>';
  }
}

async function gerarPDF(){
  var btn=document.getElementById('btnGerar');
  btn.disabled=true;btn.textContent='A gerar PDF...';
  hideAlert('okGerar');

  try{
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    var PW=210,ML=14,CW=182,y=14;
    var today=new Date().toLocaleDateString('pt-PT');
    var relNum='REL-INTIC-'+Date.now().toString().slice(-6);

    var sf=function(st,sz,c){doc.setFont('helvetica',st);doc.setFontSize(sz);doc.setTextColor.apply(doc,c||[17,17,17]);};
    var chk=function(n){if(y+(n||20)>282){doc.addPage();y=14;}};

    // Header
    doc.setFillColor(10,42,74);doc.rect(0,0,PW,24,'F');
    doc.setFillColor(240,165,0);doc.rect(0,0,4,24,'F');
    sf('bold',13,[255,255,255]);doc.text('RELATÓRIO OFICIAL — CAT ELETRÓNICO INTIC',ML+4,11);
    sf('normal',8,[176,196,216]);doc.text('Comunicação de Acidente de Trabalho — Dados Consolidados',ML+4,17);
    sf('bold',9,[240,165,0]);doc.text(relNum,PW-ML,10,{align:'right'});
    sf('normal',8,[176,196,216]);doc.text('Emitido em '+today,PW-ML,16,{align:'right'});
    y=30;

    // Resumo
    doc.setFillColor(247,250,252);doc.rect(ML,y,CW,22,'F');
    doc.setDrawColor(212,220,232);doc.setLineWidth(0.3);doc.rect(ML,y,CW,22);
    sf('bold',9,[10,42,74]);doc.text('RESUMO EXECUTIVO',ML+3,y+6);
    var empresas=[...new Set(todosCATs.map(function(c){return c.user_id;}))].length;
    var afastamento=todosCATs.filter(function(c){return c.afastamento==='Sim';}).length;
    var resumos=[
      'Total de CATs: '+todosCATs.length,
      'Empresas: '+empresas,
      'Com Afastamento: '+afastamento,
      'Sem Afastamento: '+(todosCATs.length-afastamento),
    ];
    resumos.forEach(function(r,i){
      sf('normal',8.5,[17,17,17]);
      doc.text(r, ML+3+(i*44), y+14);
    });
    y+=28;

    // Tabela cabeçalho
    chk(12);
    doc.setFillColor(10,42,74);doc.rect(ML,y,CW,8,'F');
    sf('bold',8,[255,255,255]);
    doc.text('Nº',ML+2,y+5.5);
    doc.text('Nº CAT',ML+8,y+5.5);
    doc.text('Acidentado',ML+32,y+5.5);
    doc.text('Empresa',ML+80,y+5.5);
    doc.text('Data Acidente',ML+125,y+5.5);
    doc.text('Afastamento',ML+158,y+5.5);
    y+=8;

    todosCATs.forEach(function(c,i){
      chk(10);
      var bg = i%2===0 ? [247,250,252] : [255,255,255];
      doc.setFillColor(bg[0],bg[1],bg[2]);doc.rect(ML,y,CW,9,'F');
      doc.setDrawColor(212,220,232);doc.setLineWidth(0.2);doc.rect(ML,y,CW,9);
      sf('normal',7.5,[17,17,17]);
      doc.text(String(i+1),ML+2,y+6);
      doc.text((c.cat_num||'—').slice(0,14),ML+8,y+6);
      doc.text((c.nome_acidentado||'—').slice(0,22),ML+32,y+6);
      doc.text((c.razao_social||'—').slice(0,22),ML+80,y+6);
      doc.text(c.data_acidente||'—',ML+125,y+6);
      var af=c.afastamento==='Sim'?'Sim':'Não';
      if(c.afastamento==='Sim') sf('bold',7.5,[198,0,0]);
      else sf('normal',7.5,[17,17,17]);
      doc.text(af,ML+158,y+6);
      y+=9;
    });

    y+=8;chk(20);
    doc.setFillColor(240,244,248);doc.rect(ML,y,CW,12,'F');
    sf('bold',8,[10,42,74]);doc.text('Total de registos: '+todosCATs.length+' CATs  |  Gerado por: cat-electronico.vercel.app  |  '+today,ML+3,y+8);
    y+=14;

    // Footer em todas as páginas
    var tp=doc.internal.getNumberOfPages();
    for(var p=1;p<=tp;p++){
      doc.setPage(p);
      sf('normal',6.5,[160,160,160]);
      doc.text(relNum+' · Relatório Oficial CAT Eletrónico INTIC · Pág. '+p+'/'+tp+' · '+today,PW/2,291,{align:'center'});
      doc.setDrawColor(220,220,220);doc.setLineWidth(0.2);doc.line(ML,288,PW-ML,288);
    }

    doc.save('Relatorio_INTIC_'+today.replace(/\//g,'-')+'.pdf');
    showAlert('okGerar','✓ Relatório gerado com '+todosCATs.length+' CATs!');

  }catch(e){
    alert('Erro ao gerar PDF: '+e.message);
  }

  btn.disabled=false;btn.textContent='📄 Gerar PDF Completo';
}
</script>
</body>
</html>
