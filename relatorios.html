<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Relatórios</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="background:#0f0f0f;color:#fff;font-family:Arial;padding:40px;text-align:center;">
  <h1>TESTE RELATÓRIO INTIC</h1>
  <p id="status" style="margin:20px;color:#ff6b00;">Conectando no Firebase...</p>
  <button onclick="testarFirebase()" style="padding:14px 30px;background:#ff6b00;border:none;border-radius:8px;font-weight:700;cursor:pointer;">TESTAR CONEXÃO</button>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCPx8x3DrPZLm8LMseJgxsQp2DPzUC3T28",
      authDomain: "cat-eletronico.firebaseapp.com",
      projectId: "cat-eletronico"
    });
    const db = firebase.firestore();
    
    document.getElementById('status').innerText = "Firebase carregado. Clica no botão.";

    async function testarFirebase() {
      const status = document.getElementById('status');
      status.innerText = "Buscando CATs...";
      status.style.color = "#0066cc";
      
      try {
        const snap = await db.collection('cats').get();
        const total = snap.size;
        status.innerText = `✓ FUNCIONOU! Total de CATs: ${total}`;
        status.style.color = "#28a745";
      } catch (error) {
        status.innerText = `ERRO: ${error.message}`;
        status.style.color = "#dc3545";
      }
    }
  </script>
</body>
</html>
